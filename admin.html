<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin – Dakota Rayne</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b12;
      color: white;
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }
    h1 { margin-bottom: 20px; }
    textarea {
      width: 100%;
      height: 220px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }
    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #ffb36b;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }
    .hidden { display: none; }
    .status { margin-top: 12px; opacity: 0.85; }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>

  <div id="login">
    <input type="email" id="email" placeholder="Enter your email">
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="login()">Log In</button>
    <div class="status" id="login-status"></div>
  </div>

  <div id="editor" class="hidden">
    <h2>Edit Bio</h2>
    <textarea id="bio"></textarea>
    <button onclick="saveBio()">Save Bio</button>
    <button onclick="logout()">Log Out</button>
    <div class="status" id="editor-status"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gammajebcccpnwodgrgj.supabase.coL';
    const SUPABASE_ANON_KEY = 'sb_publishable_bI93om5WFMm4xFeYC24ogA_pMbCeERK';

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const status = document.getElementById('login-status');
      status.textContent = 'Logging in...';

      const { error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        status.textContent = 'Login failed: ' + error.message;
        return;
      }

      status.textContent = '';
      checkUser();
    }

    async function logout() {
      await client.auth.signOut();
      document.getElementById('editor').classList.add('hidden');
      document.getElementById('login').classList.remove('hidden');
      document.getElementById('editor-status').textContent = '';
    }

    async function checkUser() {
      const { data } = await client.auth.getUser();
      const user = data?.user;

      if (user) {
        document.getElementById('login').classList.add('hidden');
        document.getElementById('editor').classList.remove('hidden');
        loadBio();
      }
    }

    async function loadBio() {
      const status = document.getElementById('editor-status');
      status.textContent = 'Loading bio...';

      const { data, error } = await client
        .from('site_content')
        .select('body')
        .eq('section_key', 'bio')
        .single();

      if (error) {
        status.textContent = 'Failed to load bio: ' + error.message;
        return;
      }

      document.getElementById('bio').value = data?.body || '';
      status.textContent = '';
    }

    async function saveBio() {
      const body = document.getElementById('bio').value;
      const status = document.getElementById('editor-status');
      status.textContent = 'Saving...';

      const { error } = await client
        .from('site_content')
        .update({ body, updated_at: new Date().toISOString() })
        .eq('section_key', 'bio');

      if (error) {
        status.textContent = 'Save failed: ' + error.message;
      } else {
        status.textContent = 'Saved.';
      }
    }

    checkUser();
  </script>
</body>
</html>
